version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: atarax-mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ataraxstate
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: atarax-next-web
    restart: always
    ports:
      - '3000:3000'
    environment:
      - DATABASE_URL=mysql://root:root@db:3306/ataraxstate
    depends_on:
      db:
        condition: service_healthy

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: atarax-vite-admin
    restart: always
    ports:
      - '3001:80'
    depends_on:
      - web

volumes:
  mysql_data:
